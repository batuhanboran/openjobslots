services:
  openjobslots-postgres:
    image: postgres:16-alpine
    container_name: openjobslots-postgres
    restart: unless-stopped
    mem_limit: ${OPENJOBSLOTS_POSTGRES_MEM_LIMIT:-1536m}
    memswap_limit: ${OPENJOBSLOTS_POSTGRES_MEMSWAP_LIMIT:-1536m}
    shm_size: "1gb"
    command:
      - "postgres"
      - "-c"
      - "shared_preload_libraries=${OPENJOBSLOTS_POSTGRES_SHARED_PRELOAD_LIBRARIES-pg_stat_statements}"
      - "-c"
      - "shared_buffers=${OPENJOBSLOTS_POSTGRES_SHARED_BUFFERS:-384MB}"
      - "-c"
      - "work_mem=${OPENJOBSLOTS_POSTGRES_WORK_MEM:-8MB}"
      - "-c"
      - "maintenance_work_mem=${OPENJOBSLOTS_POSTGRES_MAINTENANCE_WORK_MEM:-128MB}"
      - "-c"
      - "effective_cache_size=${OPENJOBSLOTS_POSTGRES_EFFECTIVE_CACHE_SIZE:-3GB}"
      - "-c"
      - "max_parallel_workers_per_gather=${OPENJOBSLOTS_POSTGRES_MAX_PARALLEL_WORKERS_PER_GATHER:-0}"
    environment:
      - POSTGRES_DB=openjobslots
      - POSTGRES_USER=openjobslots
      - POSTGRES_PASSWORD=${OPENJOBSLOTS_POSTGRES_PASSWORD:?Set OPENJOBSLOTS_POSTGRES_PASSWORD before starting the stack}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openjobslots -d openjobslots"]
      interval: 10s
      timeout: 5s
      retries: 5

  openjobslots-meilisearch:
    image: getmeili/meilisearch:v1.16
    container_name: openjobslots-meilisearch
    restart: unless-stopped
    mem_limit: ${OPENJOBSLOTS_MEILI_MEM_LIMIT:-4096m}
    memswap_limit: ${OPENJOBSLOTS_MEILI_MEMSWAP_LIMIT:-4096m}
    environment:
      - MEILI_ENV=production
      - MEILI_NO_ANALYTICS=true
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY:?Set MEILI_MASTER_KEY before starting the stack}
    volumes:
      - meili-data:/meili_data

  openjobslots-app:
    build: .
    container_name: openjobslots-app
    restart: unless-stopped
    mem_limit: ${OPENJOBSLOTS_APP_MEM_LIMIT:-768m}
    memswap_limit: ${OPENJOBSLOTS_APP_MEMSWAP_LIMIT:-768m}
    dns:
      - ${OPENJOBSLOTS_DNS_PRIMARY:-8.8.4.4}
      - ${OPENJOBSLOTS_DNS_SECONDARY:-149.112.112.112}
    depends_on:
      openjobslots-postgres:
        condition: service_healthy
      openjobslots-meilisearch:
        condition: service_started
    ports:
      - "8081:8787"
    environment:
      - NODE_ENV=production
      - NODE_OPTIONS=--max-old-space-size=${OPENJOBSLOTS_APP_NODE_OLD_SPACE_MB:-384}
      - PORT=8787
      - DB_PATH=/data/jobs.db
      - OPENJOBSLOTS_TRUST_PROXY=1
      - OPENJOBSLOTS_PUBLIC_RATE_LIMIT_MAX=${OPENJOBSLOTS_PUBLIC_RATE_LIMIT_MAX:-180}
      - OPENJOBSLOTS_PUBLIC_READ_CACHE_TTL_MS=${OPENJOBSLOTS_PUBLIC_READ_CACHE_TTL_MS:-120000}
      - OPENJOBSLOTS_PUBLIC_READ_CACHE_MAX_ENTRIES=${OPENJOBSLOTS_PUBLIC_READ_CACHE_MAX_ENTRIES:-750}
      - OPENJOBSLOTS_PUBLIC_POSTINGS_MAX_LIMIT=${OPENJOBSLOTS_PUBLIC_POSTINGS_MAX_LIMIT:-500}
      - OPENJOBSLOTS_PUBLIC_POSTINGS_MAX_OFFSET=${OPENJOBSLOTS_PUBLIC_POSTINGS_MAX_OFFSET:-2000}
      - OPENJOBSLOTS_ADMIN_TOKEN=${OPENJOBSLOTS_ADMIN_TOKEN:-}
      - OPENJOBSLOTS_ALLOWED_ORIGINS=${OPENJOBSLOTS_ALLOWED_ORIGINS:-http://jobs.local,https://jobs.local,https://openjobslots.com,https://www.openjobslots.com}
      - OPENJOBSLOTS_DISABLE_API_SCHEDULER=1
      - INGESTION_AUTO_SYNC_DAILY_TARGET_BUDGET=${INGESTION_AUTO_SYNC_DAILY_TARGET_BUDGET:-3000}
      - INGESTION_AUTO_SYNC_TARGETS_PER_RUN=${INGESTION_AUTO_SYNC_TARGETS_PER_RUN:-50}
      - INGESTION_SOURCE_DAILY_TARGET_BUDGET=${INGESTION_SOURCE_DAILY_TARGET_BUDGET:-250}
      - INGESTION_ADAPTIVE_SELECTION_LOOKBACK_HOURS=${INGESTION_ADAPTIVE_SELECTION_LOOKBACK_HOURS:-24}
      - OPENJOBSLOTS_HRMDIRECT_DETAIL_FETCH_LIMIT_PER_COMPANY=${OPENJOBSLOTS_HRMDIRECT_DETAIL_FETCH_LIMIT_PER_COMPANY:-35}
      - OPENJOBSLOTS_DNS_LOOKUP_TIMEOUT_MS=${OPENJOBSLOTS_DNS_LOOKUP_TIMEOUT_MS:-8000}
      - OPENJOBSLOTS_DNS_LOOKUP_RETRIES=${OPENJOBSLOTS_DNS_LOOKUP_RETRIES:-1}
      - OPENJOBSLOTS_DNS_LOOKUP_RETRY_DELAY_MS=${OPENJOBSLOTS_DNS_LOOKUP_RETRY_DELAY_MS:-250}
      - OPENJOBSLOTS_DB_BACKEND=postgres
      - OPENJOBSLOTS_SEARCH_BACKEND=meili
      - DATABASE_URL=postgres://openjobslots:${OPENJOBSLOTS_POSTGRES_PASSWORD:?Set OPENJOBSLOTS_POSTGRES_PASSWORD before starting the stack}@openjobslots-postgres:5432/openjobslots
      - MEILI_HOST=http://openjobslots-meilisearch:7700
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY:?Set MEILI_MASTER_KEY before starting the stack}
      - POSTGRES_POOL_SIZE=${OPENJOBSLOTS_APP_POSTGRES_POOL_SIZE:-6}
      - POSTGRES_APPLICATION_NAME=openjobslots-app
      - POSTGRES_CONNECTION_TIMEOUT_MS=${OPENJOBSLOTS_POSTGRES_CONNECTION_TIMEOUT_MS:-10000}
      - POSTGRES_STATEMENT_TIMEOUT_MS=${OPENJOBSLOTS_APP_POSTGRES_STATEMENT_TIMEOUT_MS:-60000}
      - POSTGRES_QUERY_TIMEOUT_MS=${OPENJOBSLOTS_APP_POSTGRES_QUERY_TIMEOUT_MS:-70000}
    volumes:
      - ./data:/data

  openjobslots-worker:
    build: .
    container_name: openjobslots-worker
    restart: unless-stopped
    mem_limit: ${OPENJOBSLOTS_WORKER_MEM_LIMIT:-768m}
    memswap_limit: ${OPENJOBSLOTS_WORKER_MEMSWAP_LIMIT:-768m}
    dns:
      - ${OPENJOBSLOTS_DNS_PRIMARY:-8.8.4.4}
      - ${OPENJOBSLOTS_DNS_SECONDARY:-149.112.112.112}
    depends_on:
      openjobslots-postgres:
        condition: service_healthy
      openjobslots-meilisearch:
        condition: service_started
    environment:
      - NODE_ENV=production
      - NODE_OPTIONS=--max-old-space-size=${OPENJOBSLOTS_WORKER_NODE_OLD_SPACE_MB:-512}
      - DB_PATH=/data/jobs.db
      - INGESTION_WORKER_CONCURRENCY=${INGESTION_WORKER_CONCURRENCY:-2}
      - INGESTION_WORKER_POLL_MS=5000
      - INGESTION_MAX_TARGETS_PER_RUN=${INGESTION_MAX_TARGETS_PER_RUN:-125}
      - INGESTION_DUE_TARGET_CANDIDATE_MAX=${INGESTION_DUE_TARGET_CANDIDATE_MAX:-2500}
      - INGESTION_PER_HOST_CONCURRENCY=${INGESTION_PER_HOST_CONCURRENCY:-1}
      - INGESTION_WORKER_INTERVAL_MS=${INGESTION_WORKER_INTERVAL_MS:-1800000}
      - INGESTION_AUTO_SYNC_DAILY_TARGET_BUDGET=${INGESTION_AUTO_SYNC_DAILY_TARGET_BUDGET:-3000}
      - INGESTION_AUTO_SYNC_TARGETS_PER_RUN=${INGESTION_AUTO_SYNC_TARGETS_PER_RUN:-50}
      - INGESTION_SOURCE_DAILY_TARGET_BUDGET=${INGESTION_SOURCE_DAILY_TARGET_BUDGET:-250}
      - INGESTION_ADAPTIVE_SELECTION_LOOKBACK_HOURS=${INGESTION_ADAPTIVE_SELECTION_LOOKBACK_HOURS:-24}
      - OPENJOBSLOTS_HRMDIRECT_DETAIL_FETCH_LIMIT_PER_COMPANY=${OPENJOBSLOTS_HRMDIRECT_DETAIL_FETCH_LIMIT_PER_COMPANY:-35}
      - OPENJOBSLOTS_DNS_LOOKUP_TIMEOUT_MS=${OPENJOBSLOTS_DNS_LOOKUP_TIMEOUT_MS:-8000}
      - OPENJOBSLOTS_DNS_LOOKUP_RETRIES=${OPENJOBSLOTS_DNS_LOOKUP_RETRIES:-1}
      - OPENJOBSLOTS_DNS_LOOKUP_RETRY_DELAY_MS=${OPENJOBSLOTS_DNS_LOOKUP_RETRY_DELAY_MS:-250}
      - OPENJOBSLOTS_DISABLE_API_SCHEDULER=1
      - OPENJOBSLOTS_AUTO_SYNC=${OPENJOBSLOTS_AUTO_SYNC:-1}
      - OPENJOBSLOTS_POSTING_HOT_DAYS=${OPENJOBSLOTS_POSTING_HOT_DAYS:-30}
      - OPENJOBSLOTS_DB_BACKEND=postgres
      - OPENJOBSLOTS_SEARCH_BACKEND=meili
      - OPENJOBSLOTS_ENABLE_PG_STAT_STATEMENTS=${OPENJOBSLOTS_ENABLE_PG_STAT_STATEMENTS:-1}
      - DATABASE_URL=postgres://openjobslots:${OPENJOBSLOTS_POSTGRES_PASSWORD:?Set OPENJOBSLOTS_POSTGRES_PASSWORD before starting the stack}@openjobslots-postgres:5432/openjobslots
      - MEILI_HOST=http://openjobslots-meilisearch:7700
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY:?Set MEILI_MASTER_KEY before starting the stack}
      - POSTGRES_POOL_SIZE=${OPENJOBSLOTS_WORKER_POSTGRES_POOL_SIZE:-4}
      - POSTGRES_APPLICATION_NAME=openjobslots-worker
      - POSTGRES_CONNECTION_TIMEOUT_MS=${OPENJOBSLOTS_POSTGRES_CONNECTION_TIMEOUT_MS:-10000}
      - POSTGRES_STATEMENT_TIMEOUT_MS=${OPENJOBSLOTS_WORKER_POSTGRES_STATEMENT_TIMEOUT_MS:-90000}
      - POSTGRES_QUERY_TIMEOUT_MS=${OPENJOBSLOTS_WORKER_POSTGRES_QUERY_TIMEOUT_MS:-100000}
    volumes:
      - ./data:/data
    command: npm run ingestion:worker

volumes:
  postgres-data:
  meili-data:
