services:
  openjobslots-postgres:
    image: postgres:16-alpine
    container_name: openjobslots-postgres
    restart: unless-stopped
    shm_size: "1gb"
    command:
      - "postgres"
      - "-c"
      - "shared_preload_libraries=${OPENJOBSLOTS_POSTGRES_SHARED_PRELOAD_LIBRARIES-pg_stat_statements}"
      - "-c"
      - "shared_buffers=${OPENJOBSLOTS_POSTGRES_SHARED_BUFFERS:-512MB}"
      - "-c"
      - "work_mem=${OPENJOBSLOTS_POSTGRES_WORK_MEM:-16MB}"
      - "-c"
      - "maintenance_work_mem=${OPENJOBSLOTS_POSTGRES_MAINTENANCE_WORK_MEM:-256MB}"
      - "-c"
      - "effective_cache_size=${OPENJOBSLOTS_POSTGRES_EFFECTIVE_CACHE_SIZE:-4GB}"
      - "-c"
      - "max_parallel_workers_per_gather=${OPENJOBSLOTS_POSTGRES_MAX_PARALLEL_WORKERS_PER_GATHER:-0}"
    environment:
      - POSTGRES_DB=openjobslots
      - POSTGRES_USER=openjobslots
      - POSTGRES_PASSWORD=${OPENJOBSLOTS_POSTGRES_PASSWORD:?Set OPENJOBSLOTS_POSTGRES_PASSWORD before starting the stack}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openjobslots -d openjobslots"]
      interval: 10s
      timeout: 5s
      retries: 5

  openjobslots-meilisearch:
    image: getmeili/meilisearch:v1.16
    container_name: openjobslots-meilisearch
    restart: unless-stopped
    environment:
      - MEILI_ENV=production
      - MEILI_NO_ANALYTICS=true
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY:?Set MEILI_MASTER_KEY before starting the stack}
    volumes:
      - meili-data:/meili_data

  openjobslots-app:
    build: .
    container_name: openjobslots-app
    restart: unless-stopped
    depends_on:
      openjobslots-postgres:
        condition: service_healthy
      openjobslots-meilisearch:
        condition: service_started
    ports:
      - "8081:8787"
    environment:
      - NODE_ENV=production
      - PORT=8787
      - DB_PATH=/data/jobs.db
      - OPENJOBSLOTS_TRUST_PROXY=1
      - OPENJOBSLOTS_ADMIN_TOKEN=${OPENJOBSLOTS_ADMIN_TOKEN:-}
      - OPENJOBSLOTS_ALLOWED_ORIGINS=${OPENJOBSLOTS_ALLOWED_ORIGINS:-http://jobs.local,https://jobs.local,https://openjobslots.com,https://www.openjobslots.com}
      - OPENPOSTINGS_DISABLE_API_SCHEDULER=1
      - OPENJOBSLOTS_DB_BACKEND=postgres
      - OPENJOBSLOTS_SEARCH_BACKEND=meili
      - DATABASE_URL=postgres://openjobslots:${OPENJOBSLOTS_POSTGRES_PASSWORD:?Set OPENJOBSLOTS_POSTGRES_PASSWORD before starting the stack}@openjobslots-postgres:5432/openjobslots
      - MEILI_HOST=http://openjobslots-meilisearch:7700
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY:?Set MEILI_MASTER_KEY before starting the stack}
      - POSTGRES_POOL_SIZE=${OPENJOBSLOTS_APP_POSTGRES_POOL_SIZE:-6}
    volumes:
      - ./data:/data

  openjobslots-worker:
    build: .
    container_name: openjobslots-worker
    restart: unless-stopped
    depends_on:
      openjobslots-postgres:
        condition: service_healthy
      openjobslots-meilisearch:
        condition: service_started
    environment:
      - NODE_ENV=production
      - DB_PATH=/data/jobs.db
      - INGESTION_WORKER_CONCURRENCY=2
      - INGESTION_WORKER_POLL_MS=5000
      - INGESTION_MAX_TARGETS_PER_RUN=500
      - INGESTION_WORKER_INTERVAL_MS=${INGESTION_WORKER_INTERVAL_MS:-1800000}
      - INGESTION_AUTO_SYNC_DAILY_TARGET_BUDGET=${INGESTION_AUTO_SYNC_DAILY_TARGET_BUDGET:-250}
      - INGESTION_AUTO_SYNC_TARGETS_PER_RUN=${INGESTION_AUTO_SYNC_TARGETS_PER_RUN:-50}
      - OPENPOSTINGS_DISABLE_API_SCHEDULER=1
      - OPENJOBSLOTS_AUTO_SYNC=${OPENJOBSLOTS_AUTO_SYNC:-1}
      - OPENJOBSLOTS_DB_BACKEND=postgres
      - OPENJOBSLOTS_SEARCH_BACKEND=meili
      - OPENJOBSLOTS_ENABLE_PG_STAT_STATEMENTS=${OPENJOBSLOTS_ENABLE_PG_STAT_STATEMENTS:-1}
      - DATABASE_URL=postgres://openjobslots:${OPENJOBSLOTS_POSTGRES_PASSWORD:?Set OPENJOBSLOTS_POSTGRES_PASSWORD before starting the stack}@openjobslots-postgres:5432/openjobslots
      - MEILI_HOST=http://openjobslots-meilisearch:7700
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY:?Set MEILI_MASTER_KEY before starting the stack}
      - POSTGRES_POOL_SIZE=${OPENJOBSLOTS_WORKER_POSTGRES_POOL_SIZE:-4}
    volumes:
      - ./data:/data
    command: npm run ingestion:worker

volumes:
  postgres-data:
  meili-data:
